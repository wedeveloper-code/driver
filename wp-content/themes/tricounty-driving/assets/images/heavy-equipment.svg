<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a2e"/>
  <!-- Excavator body -->
  <rect x="300" y="220" width="200" height="100" rx="8" fill="#c8860a"/>
  <rect x="280" y="200" width="240" height="50" rx="6" fill="#e09a10"/>
  <!-- Cab -->
  <rect x="360" y="150" width="120" height="70" rx="6" fill="#c8860a"/>
  <rect x="370" y="158" width="50" height="40" rx="3" fill="#a8d8ea" opacity="0.6"/>
  <!-- Arm -->
  <rect x="440" y="100" width="20" height="120" rx="4" fill="#9a6800" transform="rotate(-30 440 100)"/>
  <rect x="500" y="140" width="18" height="100" rx="4" fill="#9a6800" transform="rotate(20 500 140)"/>
  <!-- Bucket -->
  <path d="M540 220 L570 220 L565 260 L545 260 Z" fill="#7a5000"/>
  <!-- Tracks -->
  <rect x="270" y="310" width="260" height="30" rx="12" fill="#444"/>
  <circle cx="290" cy="325" r="18" fill="#333" stroke="#555" stroke-width="4"/>
  <circle cx="510" cy="325" r="18" fill="#333" stroke="#555" stroke-width="4"/>
  <!-- Dirt pile -->
  <ellipse cx="200" cy="340" rx="120" ry="30" fill="#5a4020" opacity="0.6"/>
  <text x="400" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#f0c040">Heavy Equipment Training</text>
  <text x="400" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#aaa">Dozers · Excavators · Loaders</text>
</svg>
